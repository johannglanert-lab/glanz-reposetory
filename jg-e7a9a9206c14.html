<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="theme-color" content="#FBFAFD">
<title>Johann Glanert · Glanz Design</title>
<meta name="description" content="Digitale Visitenkarte – Glanz Design, Köln.">
<style>
  :root{
    --bg:#fbfafd;
    --card:#ffffff;
    --line:#e7e9f0;
    --text:#0f172a;
    --muted:#5c6470;
    --blue:#0052cc;
    --blue-400:#2d7ff9;
    --blue-50:#ebf1fb;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(120% 78% at 50% -8%, var(--blue-50) 0%, var(--bg) 46%) fixed,
      var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex;align-items:center;justify-content:center;
    min-height:100svh;
    padding:24px;
  }
  .card{
    width:100%;max-width:380px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:22px;
    padding:40px 28px 28px;
    box-shadow:0 24px 60px -26px rgba(0,82,204,.30), 0 2px 10px rgba(15,23,42,.05);
    animation:rise .7s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

  /* Brand */
  .brand{text-align:center}
  .mark{
    width:48px;height:48px;margin:0 auto 18px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:700;font-size:17px;letter-spacing:.5px;
    background:linear-gradient(135deg,var(--blue-400),var(--blue));
    box-shadow:0 10px 24px -8px rgba(0,82,204,.6);
  }
  .wordmark{
    font-size:13px;font-weight:700;letter-spacing:.42em;
    text-transform:uppercase;color:var(--text);padding-left:.42em;
  }
  .rule{
    width:34px;height:2px;margin:14px auto 0;border-radius:2px;
    background:linear-gradient(90deg,transparent,var(--blue-400),transparent);
  }

  /* Identity */
  .name{
    text-align:center;margin-top:26px;
    font-family:Georgia,"Times New Roman",serif;
    font-size:30px;font-weight:600;letter-spacing:.2px;line-height:1.1;color:var(--text);
  }
  .role{
    text-align:center;margin-top:8px;
    font-size:12.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--blue);font-weight:600;
  }

  /* Actions */
  .actions{margin-top:30px;display:flex;flex-direction:column;gap:10px}
  .row{
    display:flex;align-items:center;gap:14px;
    padding:14px 16px;border:1px solid var(--line);border-radius:14px;
    color:var(--text);text-decoration:none;
    background:var(--card);
    transition:border-color .2s ease, background .2s ease, box-shadow .2s ease, transform .15s ease;
  }
  .row:active{transform:scale(.985)}
  @media(hover:hover){.row:hover{border-color:var(--blue-400);background:var(--blue-50);box-shadow:0 8px 22px -14px rgba(0,82,204,.5)}}
  .ic{flex:0 0 20px;width:20px;height:20px;color:var(--blue)}
  .rt{display:flex;flex-direction:column;min-width:0}
  .rt .lbl{font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
  .rt .val{font-size:15px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  .save{
    margin-top:18px;display:flex;align-items:center;justify-content:center;gap:10px;
    width:100%;padding:16px;border:none;border-radius:14px;cursor:pointer;
    background:linear-gradient(135deg,var(--blue-400),var(--blue));
    color:#fff;font-size:15px;font-weight:700;letter-spacing:.02em;
    box-shadow:0 14px 30px -12px rgba(0,82,204,.6);
    transition:transform .15s ease, filter .2s ease;
    font-family:inherit;
  }
  .save:active{transform:scale(.985)}
  @media(hover:hover){.save:hover{filter:brightness(1.05)}}
  .save svg{width:18px;height:18px}

  .foot{
    margin-top:24px;padding-top:18px;border-top:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;gap:8px;
    font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);
  }
  .foot a{color:var(--muted);text-decoration:none}
  .dot{width:3px;height:3px;border-radius:50%;background:var(--blue-400)}
</style>
</head>
<body>
  <main class="card" role="main">
    <div class="brand">
      <div class="mark">GD</div>
      <div class="wordmark">Glanz&nbsp;Design</div>
      <div class="rule"></div>
    </div>

    <h1 class="name">Johann Glanert</h1>
    <p class="role">Inhaber</p>

    <div class="actions">
      <a class="row" href="mailto:kontakt@glanzdesign.eu">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
        <span class="rt"><span class="lbl">E-Mail</span><span class="val">kontakt@glanzdesign.eu</span></span>
      </a>
      <a class="row" href="tel:+4917673972184">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h4l2 5-2.5 1.5a11 11 0 0 0 6 6L15 14l5 2v4a2 2 0 0 1-2 2A16 16 0 0 1 2 6a2 2 0 0 1 2-2"/></svg>
        <span class="rt"><span class="lbl">Telefon</span><span class="val">+49 176 73972184</span></span>
      </a>
      <a class="row" href="https://glanzdesign.eu" target="_blank" rel="noopener">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18"/></svg>
        <span class="rt"><span class="lbl">Website</span><span class="val">glanzdesign.eu</span></span>
      </a>
    </div>

    <button class="save" id="save" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      Kontakt speichern
    </button>

    <div class="foot">
      <a href="https://glanzdesign.eu">glanzdesign.eu</a>
      <span class="dot"></span>
      <span>Köln</span>
    </div>
  </main>

<script>
  // Build a vCard 3.0 and offer it as a download → phone opens "Add to contacts".
  var vcard = [
    "BEGIN:VCARD",
    "VERSION:3.0",
    "N:Glanert;Johann;;;",
    "FN:Johann Glanert",
    "ORG:Glanz Design",
    "TITLE:Inhaber",
    "EMAIL;TYPE=WORK,INTERNET:kontakt@glanzdesign.eu",
    "TEL;TYPE=WORK,VOICE:+4917673972184",
    "URL:https://glanzdesign.eu",
    "END:VCARD"
  ].join("\r\n");

  document.getElementById("save").addEventListener("click", function () {
    var blob = new Blob([vcard], { type: "text/vcard;charset=utf-8" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "Johann-Glanert-Glanz-Design.vcf";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 1500);
  });
</script>
</body>
</html>
